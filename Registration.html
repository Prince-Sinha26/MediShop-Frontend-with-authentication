<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <form onsubmit="login(event)">
         <div class="login-box">
        <img src="uu.png" class="logo">
         </div>
        <h2>SignUp</h2>
        <br/>
        <label for="name">Name:</label>
        <br/>
        <input type="text" id="name" name="name">
        <br/>
        <br/>
        <label for="email">Email:</label>
        <br/>
        <input type="text" id="email" email="email">
        <br/>
        <br/>
        <label for="phone">Phone:</label>
        <br/>
        <input type="tel" id="phone" phone="phone">
        <br/>
        <br/>
        <label for="password">Password:</label>
        <br/>
        <input type="password" id="password">
        <br/>
        <br/>
        <label for="occupationtype">Occupation</label>
        <select name="occupationtype"id="occupationtype">
            <option value="Student">Student</option>
            <option value="Professional">Professional</option>
            <option value="Others">Others</option>
        </select>
        <br/>
        <br/>
        <label for="DOB">Date Of Birth</label>
        <br/>
        <input type="date" id="DOB">
        <br/>
        <br/>
        <label for="Adhar">Adhar number</label>
        <br/>
        <input type="tel" id="Adhar">
        <br/>
        <br/>
        <br/>
        <button>REGISTER</button>
         <a href="index.html">Back to Login</a>

         <script>
         function register(event) {
        event.preventDefault(); // Default submission rokne ke liye
        // Registration successful message or process ke baad direct redirection
        alert("Registration Successful!"); // Ek alert message dikhayen
        window.location.href = "index.html"; // Login page redirect karne ke liye
    }
</script>

       


        

        
    
</body>
</html>
